priority_rules:
  - name: hotfix
    priority: 3000
    conditions:
      - label = hotfix
  - name: dependencies
    priority: 500
    conditions:
      - author ~= ^(renovate|dependabot)\[bot\]$

queue_rules:
  - name: default
    update_method: rebase
    queue_conditions:
      - "#check-pending = 0"
      - "#check-failure = 0"
      - check-success ~= notify
      - -conflict
      - -draft
      - "-title ~= (?i)(wip|draft|🚧)"
    merge_conditions:
      - "#check-pending = 0"
      - "#check-failure = 0"
      - check-success ~= notify
    merge_method: squash
    commit_message_template: |
      {{ title }} (#{{ number }})

      {{ body }}

pull_request_rules:
  - name: label hotfixes automatically
    conditions:
      - head ~= ^hotfix/
    actions:
      label:
        add: ["hotfix"]

  - name: automatic rebase when behind main
    conditions:
      - -draft
      - -conflict
      - base = main
      - "#commits-behind > 0"
    actions:
      rebase: {}

  - name: automatic merge for Kramarich0
    conditions:
      - author = Kramarich0
      - approved-reviews-by = coderabbitai[bot]
      - -draft
      - -conflict
      - "#check-pending = 0"
      - "#check-failure = 0"
      - check-success ~= notify
      - "-title ~= (?i)(wip|draft|🚧)"
    actions:
      queue:
        name: default
      comment:
        message: "@Kramarich0! Все проверки пройдены. Встаю в очередь на слияние! 🚀"

  - name: automatic merge for release-please
    conditions:
      - author = doxynix-release-bot[bot]
      - -draft
      - -conflict
      - "#check-pending = 0"
      - "#check-failure = 0"
      - check-success ~= notify
    actions:
      queue:
        name: default

  - name: automatic merge for dependencies
    conditions:
      - or:
          - author = renovate[bot]
          - author = dependabot[bot]
      - -draft
      - -conflict
      - "#check-pending = 0"
      - "#check-failure = 0"
      - check-success ~= notify
      - "-title ~= (?i)to v([2-9]|[1-9][0-9]+)"
    actions:
      queue:
        name: default
      comment:
        message: "@Kramarich0! Зависимости обновлены и проверены. 📦"

  # - name: label small PRs // NOTE: возможно пригодится позже
  #   conditions:
  #     - "#files < 5"
  #     - "changes < 50"
  #   actions:
  #     label:
  #       add: ["size:S"]
  # - name: label huge PRs
  #   conditions:
  #     - "changes > 500"
  #   actions:
  #     label:
  #       add: ["size:XL"]
  #     comment:
  #       message: "Ого, @{{author}}, ну ты и настрочил! 🏋️‍♂️ Такой большой PR может проверяться дольше."

  - name: delete head branch after merge
    conditions:
      - merged
    actions:
      delete_head_branch: {}

  - name: label on conflicts
    conditions:
      - conflict
      - -closed
    actions:
      label:
        add: ["conflict"]
      comment:
        message: "Упс, @Kramarich0, тут конфликт. Поправь руками! 🛠️"

packages:
  - web

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  zenstack: true

ignoredBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - esbuild
  - msgpackr-extract
  - nexus-prisma
  - puppeteer
  - zenstack

overrides:
  cross-spawn@>=7.0.0 <7.0.5: '7.0.6'
  tmp@<=0.2.3: '0.2.5'

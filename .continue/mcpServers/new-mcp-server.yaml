name: nextjs-fullstack-assistant
version: 0.0.1
schema: v1
mcpServers:
  - name: duckduckgo-search
    command: pnpm
    args:
      - dlx
      - "--yes"
      - "@modelcontextprotocol/server-duckduckgo"
    env: {}

  - name: fetch
    command: pnpm
    args:
      - dlx
      - "@modelcontextprotocol/server-fetch"
    env: {}

  - name: filesystem
    command: pnpm
    args:
      - dlx
      - "@modelcontextprotocol/server-filesystem"
      - "."
    env: {}
